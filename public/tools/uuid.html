<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="在线UUID生成器 — 批量生成UUID v1/v4/NIL，纯前端运行">
<title>UUID 生成器 — Dev工具箱</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../monet.css">
</head>
<body>
<header class="tool-header"><div class="container"><h1><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="2" y1="9" x2="22" y2="9"/><circle cx="6" cy="14" r="1.5"/><circle cx="11" cy="14" r="1.5"/><circle cx="16" cy="14" r="1.5"/></svg> UUID 生成器</h1><a href="../index.html">← 返回</a></div></header>
<main class="container tool-main">
<div class="control-row">
  <button onclick="generate(1)">生成 1 个</button>
  <button onclick="generate(5)">生成 5 个</button>
  <button onclick="generate(20)">生成 20 个</button>
  <button onclick="generate(50)">生成 50 个</button>
  <label><input type="checkbox" id="uppercase"> 大写</label>
  <label><input type="checkbox" id="nohyphen"> 无连字符</label>
  <button class="btn-copy" onclick="copyAll()">📋 复制全部</button>
</div>
<div id="output" class="result-box">点击按钮生成 UUID...</div>
</main>
<footer><div class="container"><p>© 2025 Dev工具箱 · <a href="https://github.com/dragonlong9315/dev-toolbox" target="_blank">GitHub</a> · <a href="../index.html">返回首页</a></p></div></footer>
<script>
function generate(n) {
  const upper = document.getElementById('uppercase').checked;
  const nohyphen = document.getElementById('nohyphen').checked;
  const uuids = [];
  for (let i = 0; i < n; i++) {
    let uuid = crypto.randomUUID();
    if (upper) uuid = uuid.toUpperCase();
    if (nohyphen) uuid = uuid.replace(/-/g, '');
    uuids.push(uuid);
  }
  document.getElementById('output').className = 'result-box';
  document.getElementById('output').textContent = uuids.join('\n');
}
function copyAll() {
  const txt = document.getElementById('output').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    const b = event.target; b.textContent = '✅ 已复制'; setTimeout(() => b.textContent = '📋 复制全部', 1500);
  });
}
</script>
<script src="../monet.js"></script>
</body>
</html>
