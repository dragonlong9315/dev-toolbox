<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="在线图片转 Base64 编码工具 — 将图片文件转换为 Base64 字符串，纯前端运行">
<title>图片转 Base64 — Dev工具箱</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../monet.css">
</head>
<body>
<header class="tool-header"><div class="container"><h1><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> ️ 图片转 Base64</h1><a href="../index.html">← 返回</a></div></header>
<main class="container tool-main">
<div class="control-row">
  <label class="btn" style="cursor:pointer">📁 选择图片 <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="convert()"></label>
  <button class="btn-copy" onclick="copyResult()">📋 复制 Base64</button>
  <button class="btn-outline" onclick="clearAll()">清空</button>
</div>
<div id="preview" style="text-align:center;margin:12px 0">
  <img id="previewImg" style="display:none;max-width:100%;max-height:300px;border-radius:8px;border:1px solid #ddd">
  <p id="fileInfo" style="color:#999">选择一张图片开始转换...</p>
</div>
<div class="label-row"><span>Base64 编码</span></div>
<div id="output" class="result-box" style="font-size:0.8rem">等待选择图片...</div>
</main>
<footer><div class="container"><p>© 2025 Dev工具箱 · <a href="https://github.com/dragonlong9315/dev-toolbox" target="_blank">GitHub</a> · <a href="../index.html">返回首页</a></p></div></footer>
<script>
function convert() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return;
  document.getElementById('fileInfo').textContent = `文件: ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('previewImg').style.display = 'block';
    document.getElementById('output').className = 'result-box';
    const b64 = e.target.result;
    document.getElementById('output').textContent = b64.length > 5000 
      ? b64.substring(0, 100) + '\n... [截断，总长度: ' + b64.length + ' 字符] ...\n' + b64.substring(b64.length - 100)
      : b64;
    // 存储完整数据
    document.getElementById('output').dataset.full = b64;
  };
  reader.readAsDataURL(file);
}
function copyResult() {
  const full = document.getElementById('output').dataset.full || document.getElementById('output').textContent;
  navigator.clipboard.writeText(full).then(() => {
    const b = event.target; b.textContent = '✅ 已复制'; setTimeout(() => b.textContent = '📋 复制 Base64', 1500);
  });
}
function clearAll() {
  document.getElementById('fileInput').value = '';
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('fileInfo').textContent = '选择一张图片开始转换...';
  document.getElementById('output').textContent = '等待选择图片...';
  document.getElementById('output').className = 'result-box';
  document.getElementById('output').dataset.full = '';
}
</script>
<script src="../monet.js"></script>
</body>
</html>
