<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="在线 Unix 时间戳转换工具 — 时间戳与日期互转，纯前端运行">
<title>时间戳转换 — Dev工具箱</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../monet.css">
</head>
<body>
<header class="tool-header">
  <div class="container">
    <h1><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 时间戳转换</h1>
    <a href="../index.html">← 返回工具箱</a>
  </div>
</header>
<main class="container tool-main">
  <div class="two-col">
    <div>
      <div class="label-row"><span>Unix 时间戳（秒）</span></div>
      <input type="number" id="tsInput" placeholder="如 1700000000">
      <div class="control-row">
        <button onclick="tsToDate()">→ 转日期</button>
        <button class="btn-outline" onclick="nowTs()">当前时间戳</button>
      </div>
    </div>
    <div>
      <div class="label-row"><span>日期时间</span></div>
      <input type="text" id="dateInput" placeholder="如 2025-01-01 12:00:00">
      <div class="control-row">
        <button onclick="dateToTs()">→ 转时间戳</button>
        <button class="btn-outline" onclick="nowDate()">当前时间</button>
      </div>
    </div>
  </div>
  <div class="label-row"><span>结果</span></div>
  <div id="output" class="result-box">等待操作...</div>
</main>
<footer><div class="container"><p>© 2025 Dev工具箱 · <a href="https://github.com/dragonlong9315/dev-toolbox" target="_blank">GitHub</a> · <a href="../index.html">返回首页</a></p></div></footer>
<script>
const tsInput = document.getElementById('tsInput');
const dateInput = document.getElementById('dateInput');
const output = document.getElementById('output');

function tsToDate() {
  const ts = parseInt(tsInput.value);
  if (!ts) { output.textContent = '请输入有效时间戳'; return; }
  const d = new Date(ts * 1000);
  output.className = 'result-box';
  output.innerHTML = `
<b>UTC:</b>  ${d.toUTCString()}
<b>本地:</b> ${d.toLocaleString('zh-CN')}
<b>ISO:</b>  ${d.toISOString()}
<b>毫秒:</b> ${ts * 1000}
<b>星期:</b> ${['日','一','二','三','四','五','六'][d.getDay()]}
  `.trim();
}
function dateToTs() {
  const d = new Date(dateInput.value);
  if (isNaN(d.getTime())) { output.textContent = '日期格式无效，请使用如 2025-01-01 12:00:00'; return; }
  const ts = Math.floor(d.getTime() / 1000);
  output.className = 'result-box';
  output.innerHTML = `
<b>秒:</b> ${ts}
<b>毫秒:</b> ${d.getTime()}
<b>ISO:</b> ${d.toISOString()}
  `.trim();
}
function nowTs() { tsInput.value = Math.floor(Date.now() / 1000); tsToDate(); }
function nowDate() {
  const d = new Date();
  dateInput.value = d.toLocaleString('zh-CN', { hour12: false }).replace(/\//g, '-');
  dateToTs();
}
</script>
<script src="../monet.js"></script>
</body>
</html>
