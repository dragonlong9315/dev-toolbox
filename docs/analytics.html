<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>📊 访问统计 — Dev工具箱后台</title>
<style>
:root {
  --bg: #f8fafc; --card: #fff; --text: #0f172a; --sub: #64748b;
  --pri: #3b82f6; --line: #e2e8f0; --green: #10b981; --orange: #f59e0b;
  --r: 10px; --shadow: 0 1px 3px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.container{max-width:1100px;margin:0 auto;padding:20px 24px}
h1{font-size:1.5rem;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.stat-card .label{font-size:.8rem;color:var(--sub);margin-bottom:4px}
.stat-card .value{font-size:2rem;font-weight:700}
.stat-card .sub{font-size:.78rem;color:var(--sub);margin-top:2px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
@media(max-width:700px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.card h2{font-size:.95rem;margin-bottom:12px;color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:8px 12px;background:#f1f5f9;font-weight:600;font-size:.8rem;color:var(--sub)}
td{padding:8px 12px;border-bottom:1px solid var(--line)}
.bar-wrap{background:#f1f5f9;border-radius:4px;height:8px;overflow:hidden;min-width:60px}
.bar-fill{height:100%;background:var(--pri);border-radius:4px;transition:width .5s}
.bar-fill.green{background:var(--green)}
.bar-fill.orange{background:var(--orange)}
.chart-grid{display:grid;grid-template-columns:repeat(24,1fr);gap:1px;align-items:end;height:80px}
.chart-bar{background:var(--pri);border-radius:2px 2px 0 0;min-height:1px;transition:height .5s}
.chart-labels{display:grid;grid-template-columns:repeat(6,1fr);font-size:.65rem;color:var(--sub);margin-top:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.72rem;font-weight:500}
.badge.page{background:#eff6ff;color:#2563eb}
.badge.ref{background:#f0fdf4;color:#166534}
.meta{display:flex;gap:16px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.auto-refresh{font-size:.8rem;color:var(--sub)}
.auto-refresh span{color:var(--green);font-weight:600}
a.back{color:var(--pri);text-decoration:none;font-size:.85rem}
a.back:hover{text-decoration:underline}
.empty{text-align:center;color:var(--sub);padding:30px}
</style>
</head>
<body>
<div class="container">
  <div class="meta">
    <a class="back" href="/">← 返回工具箱</a>
    <div class="auto-refresh">🟢 每 <span id="countdown">10</span> 秒自动刷新</div>
  </div>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="grid-2">
    <div class="card">
      <h2>📄 页面排行</h2>
      <div id="pageTable"></div>
    </div>
    <div class="card">
      <h2>🔗 引荐来源</h2>
      <div id="refTable"></div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <h2>🕐 今日每小时</h2>
      <div id="hourlyChart"></div>
    </div>
    <div class="card">
      <h2>📅 近14天趋势</h2>
      <div id="dailyChart"></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:24px">
    <h2>👀 最近访问</h2>
    <div id="recentTable"></div>
  </div>
</div>

<script>
const API = 'https://b88e081e42045eb9-116-27-4-215.serveousercontent.com/api/analytics';
let timer = 10;

async function load() {
  try {
    const r = await fetch(API);
    const d = await r.json();
    render(d);
  } catch (e) {
    console.error(e);
  }
}

function render(d) {
  // 统计卡片
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="label">📈 总访问量</div>
      <div class="value">${d.totalViews.toLocaleString()}</div>
      <div class="sub">自 ${d.startTime} 起</div>
    </div>
    <div class="stat-card">
      <div class="label">🟢 今日访问</div>
      <div class="value">${d.todayViews.toLocaleString()}</div>
      <div class="sub">独立 IP: ${d.todayIPs}</div>
    </div>
    <div class="stat-card">
      <div class="label">👥 总独立访客</div>
      <div class="value">${d.totalIPs.toLocaleString()}</div>
      <div class="sub">总 IP 去重</div>
    </div>
    <div class="stat-card">
      <div class="label">📊 访问页面数</div>
      <div class="value">${d.pages.length}</div>
      <div class="sub">不含 API 请求</div>
    </div>
  `;

  // 页面排行
  const maxPage = Math.max(1, ...d.pages.map(p => p.views));
  document.getElementById('pageTable').innerHTML = d.pages.length > 0
    ? '<table><tr><th>页面</th><th>总访问</th><th>今日</th><th></th></tr>' +
      d.pages.slice(0, 15).map(p => `
        <tr>
          <td><span class="badge page">${escapeHtml(p.page)}</span></td>
          <td>${p.views}</td>
          <td>${p.today}</td>
          <td><div class="bar-wrap"><div class="bar-fill" style="width:${(p.views/maxPage*100).toFixed(0)}%"></div></div></td>
        </tr>
      `).join('') + '</table>'
    : '<div class="empty">暂无数据</div>';

  // 引荐来源
  const maxRef = Math.max(1, ...d.referrers.map(r => r.count));
  document.getElementById('refTable').innerHTML = d.referrers.length > 0
    ? '<table><tr><th>来源</th><th>次数</th></tr>' +
      d.referrers.map(r => `
        <tr>
          <td><span class="badge ref">${escapeHtml(r.host)}</span></td>
          <td>${r.count}</td>
        </tr>
      `).join('') + '</table>'
    : '<div class="empty">暂无引荐数据</div>';

  // 每小时图
  const maxHour = Math.max(1, ...d.hourly);
  document.getElementById('hourlyChart').innerHTML = `
    <div class="chart-grid">
      ${d.hourly.map(v => `<div class="chart-bar" style="height:${Math.max(1,(v/maxHour*100)).toFixed(0)}%" title="${v}"></div>`).join('')}
    </div>
    <div class="chart-labels"><span>0时</span><span>4时</span><span>8时</span><span>12时</span><span>16时</span><span>20时</span></div>
  `;

  // 每日趋势
  const maxDaily = Math.max(1, ...d.daily.map(v => v.count));
  document.getElementById('dailyChart').innerHTML = `
    <div class="chart-grid" style="grid-template-columns:repeat(${d.daily.length},1fr)">
      ${d.daily.map(v => `<div class="chart-bar ${v.count===0?'':'green'}" style="height:${Math.max(1,(v.count/maxDaily*100)).toFixed(0)}%" title="${v.date}: ${v.count}"></div>`).join('')}
    </div>
    <div class="chart-labels" style="grid-template-columns:repeat(${Math.min(7,d.daily.length)},1fr);font-size:.6rem;margin-top:6px">
      ${d.daily.filter((_,i) => i % Math.ceil(d.daily.length/7) === 0).map(v => `<span>${v.date.slice(5)}</span>`).join('')}
    </div>
  `;

  // 最近访问
  document.getElementById('recentTable').innerHTML = d.recent.length > 0
    ? '<table><tr><th>时间</th><th>页面</th><th>IP</th><th>来源</th></tr>' +
      d.recent.map(r => `
        <tr>
          <td style="font-size:.8rem">${r.time}</td>
          <td><span class="badge page">${escapeHtml(r.page)}</span></td>
          <td style="font-family:monospace;font-size:.78rem">${escapeHtml(r.ip)}</td>
          <td style="font-size:.78rem">${escapeHtml(r.ref)}</td>
        </tr>
      `).join('') + '</table>'
    : '<div class="empty">暂无访问记录</div>';
}

function escapeHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 自动刷新
setInterval(() => {
  timer--;
  document.getElementById('countdown').textContent = timer;
  if (timer <= 0) { timer = 10; load(); }
}, 1000);

load();
</script>
</body>
</html>
