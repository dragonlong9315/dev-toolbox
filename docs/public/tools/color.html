<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="在线颜色格式转换工具 — HEX / RGB / HSL 互转，纯前端运行">
<title>颜色转换 — Dev工具箱</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../monet.css">
</head>
<body>
<header class="tool-header">
  <div class="container">
    <h1><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M12 2a6 6 0 0 0 0 20"/></svg> 颜色格式转换</h1>
    <a href="../index.html">← 返回工具箱</a>
  </div>
</header>
<main class="container tool-main">
  <div class="two-col">
    <div>
      <div class="label-row"><span>HEX</span></div>
      <input type="text" id="hexInput" placeholder="#4361ee" value="#4361ee" maxlength="7">
    </div>
    <div>
      <div class="label-row"><span>RGB</span></div>
      <input type="text" id="rgbInput" placeholder="rgb(67, 97, 238)">
    </div>
    <div>
      <div class="label-row"><span>HSL</span></div>
      <input type="text" id="hslInput" placeholder="hsl(230, 83%, 60%)">
    </div>
    <div>
      <div class="label-row"><span>颜色选择器</span></div>
      <input type="color" id="colorPicker" value="#4361ee" style="width:100%;height:44px;cursor:pointer">
    </div>
  </div>
  <div class="color-preview" id="preview" style="background:#4361ee"></div>
  <div class="label-row"><span>所有格式</span></div>
  <div id="output" class="result-box">
HEX: #4361ee
RGB: rgb(67, 97, 238)
HSL: hsl(230, 83%, 60%)
  </div>
</main>
<footer><div class="container"><p>© 2025 Dev工具箱 · 纯前端运行 · <a href="../index.html">返回首页</a></p></div></footer>
<script>
const hexInput = document.getElementById('hexInput');
const rgbInput = document.getElementById('rgbInput');
const hslInput = document.getElementById('hslInput');
const colorPicker = document.getElementById('colorPicker');
const preview = document.getElementById('preview');
const output = document.getElementById('output');

function updateAll(color) {
  preview.style.background = color;

  // 解析颜色
  const dummy = document.createElement('div');
  dummy.style.color = color;
  document.body.appendChild(dummy);
  const computed = getComputedStyle(dummy).color;
  document.body.removeChild(dummy);

  // 解析 computed rgb(r, g, b)
  const match = computed.match(/[\d.]+/g);
  if (!match || match.length < 3) return;
  const [r, g, b] = match.map(Number);

  // RGB
  const rgb = `rgb(${r}, ${g}, ${b})`;

  // HEX
  const hex = '#' + [r, g, b].map(c => Math.round(c).toString(16).padStart(2, '0')).join('');

  // HSL
  const rn = r / 255, gn = g / 255, bn = b / 255;
  const max = Math.max(rn, gn, bn), min = Math.min(rn, gn, bn);
  let h = 0, s = 0, l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case rn: h = ((gn - bn) / d + (gn < bn ? 6 : 0)) / 6; break;
      case gn: h = ((bn - rn) / d + 2) / 6; break;
      case bn: h = ((rn - gn) / d + 4) / 6; break;
    }
  }
  const hsl = `hsl(${Math.round(h * 360)}, ${Math.round(s * 100)}%, ${Math.round(l * 100)}%)`;

  hexInput.value = hex;
  rgbInput.value = rgb;
  hslInput.value = hsl;
  colorPicker.value = hex;

  output.innerHTML = `HEX: ${hex}\nRGB: ${rgb}\nHSL: ${hsl}`;
}

hexInput.addEventListener('input', () => updateAll(hexInput.value));
rgbInput.addEventListener('input', () => updateAll(rgbInput.value));
hslInput.addEventListener('input', () => updateAll(hslInput.value));
colorPicker.addEventListener('input', () => updateAll(colorPicker.value));

updateAll('#4361ee');
</script>
<script src="../monet.js"></script>
</body>
</html>
