<footer><div class="container"><p>В© 2025 Devе·Ҙе…·з®ұ В· зәҜеүҚз«ҜиҝҗиЎҢ В· <a href="../index.html">иҝ”еӣһйҰ–йЎө</a></p></div></footer>
<script>
const input = document.getElementById('input');
const preview = document.getElementById('preview');

function renderMarkdown(md) {
  let html = md;
  // иҪ¬д№ү HTML
  html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // д»Јз Ғеқ— ```
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="$1">$2</code></pre>');
  // иЎҢеҶ…д»Јз Ғ `
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // ж Үйўҳ
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // зІ—дҪ“ ** **
  html = html.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  // ж–ңдҪ“ * *
  html = html.replace(/\*(.+?)\*/g, '<i>$1</i>');
  // еӣҫзүҮ
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  // й“ҫжҺҘ
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  // еј•з”Ё >
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // ж°ҙе№ізәҝ
  html = html.replace(/^---$/gm, '<hr>');
  // ж— еәҸеҲ—иЎЁ
  html = html.replace(/^\- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // иЎЁж ј
  html = html.replace(/^\|(.+)\|$/gm, function(match) {
    const cells = match.split('|').filter(c => c.trim()).map(c => c.trim());
    if (cells.every(c => /^[-:]+$/.test(c))) return ''; // еҲҶйҡ”иЎҢ
    const tag = match.includes('---') ? 'td' : 'th';
    return '<tr>' + cells.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>';
  });
  // жҚўиЎҢ
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  // жё…зҗҶз©әж Үзӯҫ
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/<p><\/p>/g, '');

  return html;
}

function update() {
  preview.innerHTML = renderMarkdown(input.value);
}

input.addEventListener('input', update);

function copyHtml() {
  navigator.clipboard.writeText(preview.innerHTML).then(() => {
    const btn = event.target; btn.textContent = 'вң… е·ІеӨҚеҲ¶'; setTimeout(() => btn.textContent = 'рҹ“Ӣ еӨҚеҲ¶ HTML', 1500);
  });
}

function clearAll() {
  input.value = '';
  preview.innerHTML = '';
}

// еҲқе§ӢжёІжҹ“
update();
</script>
<script src="../monet.js"></script>
